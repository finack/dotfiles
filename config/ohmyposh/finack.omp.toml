#:schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version = 2
final_space = true
console_title_template = '{{ .Folder }}'

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

  [[blocks.segments]]
  type = 'path'
  style = 'plain'
  background = 'transparent'
  foreground = 'cyan'
  template = '{{ .Path }}'

    [blocks.segments.properties]
    style = 'full'

  [[blocks.segments]]
  type = 'git'
  style = 'plain'
  foreground = 'p:blue'
  background = 'transparent'
  template = ' {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }} <cyan>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>'

    [blocks.segments.properties]
    branch_icon = ''
    commit_icon = '@'
    fetch_status = true

[[blocks]]
type = 'rprompt'
overflow = 'hidden'

  [[blocks.segments]]
  type = 'executiontime'
  style = 'plain'
  foreground = 'yellow'
  background = 'transparent'
  template = '{{ .FormattedMs }}'

    [blocks.segments.properties]
    threshold = 5000

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

  [[blocks.segments]]
  type = 'text'
  style = 'plain'
  foreground_templates = [
    "{{if gt .Code 0}}red{{end}}",
    "{{if eq .Code 0}}magenta{{end}}",
  ]
  background = 'transparent'
  template = '❯'

[transient_prompt]
foreground_templates = [
  "{{if gt .Code 0}}red{{end}}",
  "{{if eq .Code 0}}magenta{{end}}",
]
background = 'transparent'
template = '❯ '

[secondary_prompt]
foreground = 'magenta'
background = 'transparent'
template = '❯❯ '

[palette]
# https://draculatheme.com/contribute#color-palette
black = "#282a36"   # Background
white = "#f8f8f2"   # Foreground
grey = "#44475A"    # Current Line
blue = "#6272a4"    # Comments
cyan = "#8be9fd"
green = "#50FA7B"
magenta = "#ff79c6"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#FF5555"
yellow = "#f1fa8c"
